name: CI

on:
  push:
    branches: [master]
  pull_request:

# No repo secrets are used anywhere in this workflow. The DATABASE_URL below
# is a throwaway placeholder: `prisma generate` only reads the schema, and the
# typecheck never opens a DB connection — so a fake value is enough and nothing
# sensitive is exposed.
env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Typecheck
        run: bunx tsc --noEmit
