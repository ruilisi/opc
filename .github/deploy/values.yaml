replicaCount: 1

image:
  repository: your-registry/opc
  tag: latest
  pullPolicy: Always

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: opc.example.com
  paths: ['/']
  tls_all: true

env:
  PORT: "3000"
  NODE_ENV: production
  NEXT_PUBLIC_GAME_WEB_URL: "https://your-oauth-provider.example.com"
  NEXT_PUBLIC_GO_API_URL: "https://your-api.example.com"

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

livenessProbe:
  enabled: true
  initialDelaySeconds: 10
  httpGet:
    path: /
    port: 3000

readinessProbe:
  enabled: true
  initialDelaySeconds: 10
  httpGet:
    path: /
    port: 3000
